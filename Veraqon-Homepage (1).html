document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d-6a95-44dd-86b4-2cb993c1832f\") format('opentype');\n  font-weight: normal;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* ─── Design Tokens ────────────────────────────────────────────────────────── */\n\n:root {\n\n  /* ── Primary Palette — Option A: Deep Navy + Royal Blue ──────────────── */\n  --color-navy:            #0F172A;   /* Deep Navy — headlines, footer, wordmark anchor */\n  --color-navy-800:        #1E293B;   /* Slightly lighter navy — alt dark surfaces */\n  --color-blue:            #2563EB;   /* Royal Blue — ALL CTAs, links, active states */\n  --color-blue-hover:      #1D4ED8;   /* Button hover (150ms ease) */\n  --color-blue-light:      #3B82F6;   /* Blue-500 — lighter accents */\n  --color-blue-100:        #DBEAFE;   /* Blue-100 — hover fills, chip bg */\n  --color-blue-50:         #EFF6FF;   /* Blue-50 — badge bg, tint fills */\n  --color-white:           #FFFFFF;   /* Default page bg, card bg, text on dark */\n  --color-slate-50:        #F8FAFC;   /* Lightest bg — near-white */\n  --color-slate-100:       #F1F5F9;   /* Alt section bg — cool off-white */\n\n  /* ── Secondary / Trust ────────────────────────────────────────────────── */\n  --color-teal:            #0D9488;   /* Cool Teal — Trust Score / Verified ONLY */\n  --color-teal-hover:      #0F766E;   /* Teal hover */\n  --color-teal-bg:         #F0FDFA;   /* Teal-50 — badge background */\n  --color-teal-border:     rgba(13,148,136,0.3); /* Teal border at 30% */\n\n  /* ── Neutral Scale (cool slate) ───────────────────────────────────────── */\n  --color-slate-900:       #0F172A;   /* = navy — darkest text */\n  --color-slate-700:       #334155;   /* Primary body text */\n  --color-slate-500:       #64748B;   /* Muted / captions / meta */\n  --color-slate-400:       #94A3B8;   /* Placeholder text */\n  --color-slate-300:       #CBD5E1;   /* Borders / dividers */\n  --color-slate-200:       #E2E8F0;   /* Subtle borders */\n\n  /* ── Functional / Status ──────────────────────────────────────────────── */\n  --color-error:           #DC2626;   /* Error states, validation failures */\n  --color-warning:         #D97706;   /* Warning states, pending actions */\n  --color-success:         #059669;   /* Success confirmations */\n\n  /* ── Semantic aliases ─────────────────────────────────────────────────── */\n  --color-primary:         var(--color-blue);\n  --color-primary-hover:   var(--color-blue-hover);\n  --color-foreground:      var(--color-navy);\n  --color-body:            var(--color-slate-700);\n  --color-muted:           var(--color-slate-500);\n  --color-background:      var(--color-white);\n  --color-surface:         var(--color-white);\n  --color-surface-alt:     var(--color-slate-100);\n  --color-border:          var(--color-slate-300);\n\n  /* ─── Typography ─────────────────────────────────────────────────────────── */\n\n  /* Font Families */\n  --font-sans:    \"Inter\", system-ui, -apple-system, sans-serif;  /* ALL UI copy */\n  --font-agency:  \"Agency\", sans-serif;                           /* Wordmark ONLY */\n  --font-mono:    \"JetBrains Mono\", Menlo, Monaco, monospace;     /* Code / API */\n\n  /* Semantic roles */\n  --font-body:    var(--font-sans);\n  --font-display: var(--font-agency);\n  --font-code:    var(--font-mono);\n\n  /* ─── Type Scale (from approved brief) ────────────────────────────────── */\n\n  /* Hero Headline — 56–72px, Bold 700, Obsidian */\n  --text-hero-size:     clamp(3.5rem, 6vw, 4.5rem);\n  --text-hero-weight:   700;\n  --text-hero-leading:  1.1;\n  --text-hero-tracking: -0.02em;\n\n  /* Section Headline — 36–44px, Bold 700, Obsidian */\n  --text-h1-size:       clamp(2.25rem, 4vw, 2.75rem);\n  --text-h1-weight:     700;\n  --text-h1-leading:    1.2;\n  --text-h1-tracking:   -0.02em;\n\n  /* Sub-headline — 20–24px, Semibold 600, Obsidian */\n  --text-h2-size:       1.375rem;   /* 22px */\n  --text-h2-weight:     600;\n  --text-h2-leading:    1.3;\n  --text-h2-tracking:   -0.01em;\n\n  /* Card title — 18px, Semibold */\n  --text-h3-size:       1.125rem;\n  --text-h3-weight:     600;\n  --text-h3-leading:    1.4;\n\n  /* Body Large — 18px, Regular 400, Near-Black */\n  --text-lg-size:       1.125rem;\n  --text-lg-weight:     400;\n  --text-lg-leading:    1.6;\n\n  /* Body Default — 16px, Regular 400, Near-Black */\n  --text-base-size:     1rem;\n  --text-base-weight:   400;\n  --text-base-leading:  1.6;\n\n  /* Body Small / Captions — 14px, Regular 400, Stone Gray */\n  --text-sm-size:       0.875rem;\n  --text-sm-weight:     400;\n  --text-sm-leading:    1.5;\n\n  /* Button Text — 16px, Semibold 600 */\n  --text-btn-size:      1rem;\n  --text-btn-weight:    600;\n\n  /* Navigation — 15px, Medium 500 */\n  --text-nav-size:      0.9375rem;\n  --text-nav-weight:    500;\n\n  /* Section Label — 13px, ALL CAPS, Stone Gray, +0.05em tracking */\n  --text-label-size:    0.8125rem;\n  --text-label-weight:  500;\n  --text-label-tracking:0.05em;\n\n  /* Code — 14px, Regular, JetBrains Mono */\n  --text-code-size:     0.875rem;\n  --text-code-weight:   400;\n\n  /* ─── Spacing (from approved brief) ─────────────────────────────────────── */\n\n  --space-xs:   0.25rem;    /* 4px  — tight internal, icon padding */\n  --space-sm:   0.5rem;     /* 8px  — icon+label, badge elements */\n  --space-md:   1rem;       /* 16px — related elements within card */\n  --space-lg:   1.5rem;     /* 24px — between paragraphs, form fields */\n  --space-xl:   2rem;       /* 32px — between cards, content blocks */\n  --space-2xl:  3rem;       /* 48px — between sub-sections */\n  --space-3xl:  4rem;       /* 64px — between major page sections */\n  --space-4xl:  6rem;       /* 96–120px — section top/bottom padding */\n\n  /* Section rhythm */\n  --section-py:     6rem;   /* 96px default */\n  --section-py-lg:  7.5rem; /* 120px max */\n\n  /* Content max-width */\n  --max-width:    1200px;\n  --card-padding: 2rem;     /* 32px */\n\n  /* ─── Border Radius (from approved brief) ────────────────────────────────── */\n\n  --radius-sm:   0.5rem;    /* 8px — cards, buttons */\n  --radius-md:   0.5rem;    /* 8px — canonical component radius */\n  --radius-full: 9999px;    /* pill — compact tags only */\n\n  /* ─── Shadows ─────────────────────────────────────────────────────────────── */\n  /* Cards use 1px border only — no drop shadows (too heavy) */\n\n  --shadow-none:    none;\n  --shadow-focus:   0 0 0 3px rgba(37,99,235,0.20);  /* Blue focus ring */\n  --shadow-modal:   0 20px 40px rgba(15,23,42,0.18); /* Modals only */\n\n  /* ─── Transitions ────────────────────────────────────────────────────────── */\n\n  --transition-fast:  150ms ease;   /* Hover states per brief */\n  --transition-base:  200ms ease;\n  --transition-slow:  300ms ease;\n\n  /* ─── Z-index ────────────────────────────────────────────────────────────── */\n\n  --z-base:     0;\n  --z-dropdown: 10;\n  --z-sticky:   40;\n  --z-fixed:    50;\n  --z-modal:    50;\n  --z-toast:    60;\n}\n\n/* ─── Base Styles ──────────────────────────────────────────────────────────── */\n\n*, *::before, *::after { box-sizing: border-box; }\n\nbody {\n  font-family: var(--font-sans);\n  font-size: var(--text-base-size);\n  font-weight: var(--text-base-weight);\n  line-height: var(--text-base-leading);\n  color: var(--color-near-black);\n  background-color: var(--color-white);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* ─── Semantic Type Classes ──────────────────────────────────────────────────*/\n\n/* Hero headline */\n.text-hero {\n  font-family: var(--font-sans);\n  font-size: var(--text-hero-size);\n  font-weight: var(--text-hero-weight);\n  line-height: var(--text-hero-leading);\n  letter-spacing: var(--text-hero-tracking);\n  color: var(--color-obsidian);\n}\n\n/* Section headlines */\n.h1 {\n  font-family: var(--font-sans);\n  font-size: var(--text-h1-size);\n  font-weight: var(--text-h1-weight);\n  line-height: var(--text-h1-leading);\n  letter-spacing: var(--text-h1-tracking);\n  color: var(--color-obsidian);\n}\n\n.h2 {\n  font-family: var(--font-sans);\n  font-size: var(--text-h2-size);\n  font-weight: var(--text-h2-weight);\n  line-height: var(--text-h2-leading);\n  color: var(--color-obsidian);\n}\n\n.h3 {\n  font-family: var(--font-sans);\n  font-size: var(--text-h3-size);\n  font-weight: var(--text-h3-weight);\n  line-height: var(--text-h3-leading);\n  color: var(--color-obsidian);\n}\n\n/* Section labels — ALL CAPS */\n.label-section {\n  font-family: var(--font-sans);\n  font-size: var(--text-label-size);\n  font-weight: var(--text-label-weight);\n  letter-spacing: var(--text-label-tracking);\n  text-transform: uppercase;\n  color: var(--color-stone);\n}\n\n/* Body copy */\n.text-body {\n  font-family: var(--font-sans);\n  font-size: var(--text-base-size);\n  font-weight: var(--text-base-weight);\n  line-height: var(--text-base-leading);\n  color: var(--color-near-black);\n}\n\n.text-body-lg {\n  font-family: var(--font-sans);\n  font-size: var(--text-lg-size);\n  font-weight: var(--text-lg-weight);\n  line-height: var(--text-lg-leading);\n  color: var(--color-near-black);\n}\n\n.text-caption {\n  font-family: var(--font-sans);\n  font-size: var(--text-sm-size);\n  font-weight: var(--text-sm-weight);\n  color: var(--color-stone);\n  line-height: var(--text-sm-leading);\n}\n\n.text-muted { color: var(--color-stone); }\n\n/* Brand wordmark — Agency OTF only */\n.brand-wordmark {\n  font-family: var(--font-agency);\n  font-weight: normal;\n  letter-spacing: -0.02em;\n  color: var(--color-obsidian);\n}\n\n/* Code */\ncode, pre, .text-code {\n  font-family: var(--font-mono);\n  font-size: var(--text-code-size);\n  background: var(--color-off-white);\n  color: var(--color-near-black);\n}\n\n/* ─── Scrollbar ──────────────────────────────────────────────────────────────*/\n\n* { scrollbar-width: thin; scrollbar-color: var(--color-border) transparent; }\n::-webkit-scrollbar { width: 6px; height: 6px; }\n::-webkit-scrollbar-track { background: transparent; }\n::-webkit-scrollbar-thumb { background-color: var(--color-border); border-radius: 3px; }\n::-webkit-scrollbar-thumb:hover { background-color: var(--color-stone); }\n<\u002Fstyle>\n<script src=\"6f738971-4fda-443d-af88-981b2d7945f5\"><\u002Fscript>\n\n<style>\n  /* ── Reset ──────────────────────────────────────────────────── */\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html, body { background: var(--color-white); color: var(--color-navy); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; }\n  body { font-size: 16px; line-height: 1.6; }\n  a { color: inherit; text-decoration: none; }\n  img { display: block; max-width: 100%; }\n  button { font-family: inherit; cursor: pointer; }\n\n  /* ── Layout primitives ──────────────────────────────────────── */\n  .wrap { max-width: 1200px; margin: 0 auto; padding: 0 32px; }\n  .wrap-wide { max-width: 1320px; margin: 0 auto; padding: 0 32px; }\n  .section { padding: 96px 0; border-top: 1px solid var(--color-slate-200); }\n  .section-tight { padding: 64px 0; }\n\n  /* ── Eyebrow / labels ───────────────────────────────────────── */\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase;\n    color: var(--color-blue);\n  }\n  .eyebrow .dot { width: 6px; height: 6px; border-radius: 999px; background: var(--color-blue); display: inline-block; }\n  .eyebrow-muted { color: var(--color-slate-500); }\n  .eyebrow-muted .dot { background: var(--color-slate-400); }\n  .eyebrow-on-dark { color: #93C5FD; }\n  .eyebrow-on-dark .dot { background: #93C5FD; }\n\n  /* ── Buttons ────────────────────────────────────────────────── */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n    height: 48px; padding: 0 22px;\n    border-radius: 8px; border: 1px solid transparent;\n    font-size: 15px; font-weight: 600;\n    transition: background 150ms ease, color 150ms ease, border-color 150ms ease, transform 150ms ease;\n    white-space: nowrap;\n  }\n  .btn svg { width: 16px; height: 16px; }\n  .btn-primary { background: var(--color-blue); color: #fff; }\n  .btn-primary:hover { background: var(--color-blue-hover); }\n  .btn-secondary { background: transparent; color: var(--color-navy); border-color: var(--color-navy); }\n  .btn-secondary:hover { background: var(--color-navy); color: #fff; }\n  .btn-ghost { background: transparent; color: var(--color-navy); border-color: var(--color-slate-300); }\n  .btn-ghost:hover { border-color: var(--color-navy); }\n  .btn-sm { height: 38px; padding: 0 14px; font-size: 13.5px; }\n  .btn-lg { height: 54px; padding: 0 28px; font-size: 16px; }\n  .btn-on-dark { background: #fff; color: var(--color-navy); }\n  .btn-on-dark:hover { background: var(--color-slate-100); }\n  .btn-outline-light { background: transparent; color: #fff; border-color: rgba(255,255,255,0.35); }\n  .btn-outline-light:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.6); }\n\n  /* ── Header ─────────────────────────────────────────────────── */\n  .header {\n    position: sticky; top: 0; z-index: 50;\n    background: rgba(255,255,255,0.85);\n    backdrop-filter: saturate(180%) blur(12px);\n    -webkit-backdrop-filter: saturate(180%) blur(12px);\n    border-bottom: 1px solid var(--color-slate-200);\n  }\n  .header-inner { display: flex; align-items: center; justify-content: space-between; height: 68px; }\n  .brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-agency); font-size: 26px; letter-spacing: -0.01em; color: var(--color-navy); }\n  .brand .mark {\n    width: 28px; height: 28px; border-radius: 6px;\n    background: var(--color-navy); color: #fff;\n    display: inline-flex; align-items: center; justify-content: center;\n    font-family: var(--font-sans); font-weight: 700; font-size: 14px; letter-spacing: 0; uous loop powered by Rachel.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">01 / Source<\u002Fspan>\n        <div class=\"pillar-icon\"><i data-lucide=\"search\"><\u002Fi><\u002Fdiv>\n        <h3>A pre-vetted talent network<\u002Fh3>\n        <p>Every profile in Veraqon has completed a Rachel interview. No resumes-only profiles. No unverified self-claims. You search a pool of people who have already proven what they can do.<\u002Fp>\n        <a href=\"#\" class=\"pillar-link\">Browse the network <i data-lucide=\"arrow-right\"><\u002Fi><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">02 / Vet<\u002Fspan>\n        <div class=\"pillar-icon\"><i data-lucide=\"messages-square\"><\u002Fi><\u002Fdiv>\n        <h3>Rachel, your AI interviewer<\u002Fh3>\n        <p>Voice-based, conversational, and unbiased. Rachel runs a 25-minute structured interview, probes for depth, runs the coding exercise, and returns a trust score with full transcript and proctoring data.<\u002Fp>\n        <a href=\"#\" class=\"pillar-link\">Meet Rachel <i data-lucide=\"arrow-right\"><\u002Fi><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <span class=\"pillar-num\">03 / Match<\u002Fspan>\n        <div class=\"pillar-icon\"><i data-lucide=\"sparkles\"><\u002Fi><\u002Fdiv>\n        <h3>Ranked profiles, not piles<\u002Fh3>\n        <p>Post a query. Receive a ranked shortlist within hours, scored against the exact skills, seniority, and behavioural signals you set. Skip the phone screen. Go straight to a final round that matters.<\u002Fp>\n        <a href=\"#\" class=\"pillar-link\">See a sample shortlist <i data-lucide=\"arrow-right\"><\u002Fi><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ─────────────────  HOW IT WORKS  ───────────────── -->\n<section class=\"section\" id=\"how\" data-screen-label=\"03 How it works\" style=\"background: var(--color-slate-50);\">\n  <div class=\"wrap\">\n    <div class=\"section-head\">\n      <span class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>How it works<\u002Fspan><\u002Fspan>\n      <h2 class=\"h1\">From query to <em>signed offer<\u002Fem>, in days.<\u002Fh2>\n      <p>Four moves replace the eight weeks your team spends on screening, scheduling, and chasing.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n      <div class=\"steps-list\" id=\"steps-list\">\n        <div class=\"step active\" data-step=\"0\">\n          <div class=\"step-num\">01<\u002Fdiv>\n          <div>\n            <h4>Post a query<\u002Fh4>\n            <div class=\"step-body\">Describe the role in plain language — skills, seniority, comp band, geography. No job-description gymnastics, no boolean strings.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\" data-step=\"1\">\n          <div class=\"step-num\">02<\u002Fdiv>\n          <div>\n            <h4>Rachel interviews the pool<\u002Fh4>\n            <div class=\"step-body\">Rachel runs a 25-minute structured interview with every match in our network — voice, code, behaviour, proctoring. You see the exact transcript and scoring rubric.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\" data-step=\"2\">\n          <div class=\"step-num\">03<\u002Fdiv>\n          <div>\n            <h4>Receive a ranked shortlist<\u002Fh4>\n            <div class=\"step-body\">A scored shortlist lands in your inbox within hours. Trust score, skill breakdown, video, and a one-line summary of why each candidate is on the list.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"step\" data-step=\"3\">\n          <div class=\"step-num\">04<\u002Fdiv>\n          <div>\n            <h4>Hire, in days<\u002Fh4>\n            <div class=\"step-body\">Skip the phone screen. Take the shortlist straight to a final round. We handle scheduling, contracts, and global compliance through Veraqon Payroll.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"steps-vis\" id=\"steps-vis\">\n        <!-- step 0 -->\n        <div class=\"step-card active\" data-card=\"0\">\n          <div class=\"step-card-title\"><span>// query.veraqon.io<\u002Fspan><span style=\"color:var(--color-blue)\">DRAFT<\u002Fspan><\u002Fdiv>\n          <div class=\"query-builder\">\n            <div class=\"qb-row\"><span class=\"qb-label\">Role<\u002Fspan><div class=\"qb-value\">Senior ML Infra Engineer<\u002Fdiv><\u002Fdiv>\n            <div class=\"qb-row\"><span class=\"qb-label\">Required skills<\u002Fspan>\n              <div class=\"qb-chips\">\n                <span class=\"qb-chip\">CUDA<\u002Fspan><span class=\"qb-chip\">PyTorch<\u002Fspan><span class=\"qb-chip\">vLLM<\u002Fspan><span class=\"qb-chip\">Ray<\u002Fspan><span class=\"qb-chip\">+3<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"qb-row\"><span class=\"qb-label\">Comp band<\u002Fspan><div class=\"qb-value\">$220K – $310K · USD · Remote<\u002Fdiv><\u002Fdiv>\n            <div class=\"qb-row\"><span class=\"qb-label\">Headcount<\u002Fspan><div class=\"qb-value\">3 hires · Q2 2026<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- step 1 -->\n        <div class=\"step-card\" data-card=\"1\">\n          <div class=\"step-card-title\"><span>// rachel · live<\u002Fspan><span style=\"color:#DC2626\">● REC<\u002Fspan><\u002Fdiv>\n          <div class=\"rachel-mini\">\n            <div class=\"rm-head\">\n              <div class=\"rm-avatar\">R<\u002Fdiv>\n              <div><div class=\"rm-name\">Rachel<\u002Fdiv><div class=\"rm-role\">AI Interviewer<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"rm-bubble\">Tell me about a time you reduced inference latency on a production model. What was your approach?<\u002Fdiv>\n            <div class=\"r  r1;\n        const x2 = 200 + Math.cos(angle) * r2;\n        const y2 = 200 + Math.sin(angle) * r2;\n        const line = document.createElementNS(SVGNS, 'line');\n        line.setAttribute('x1', x1); line.setAttribute('y1', y1);\n        line.setAttribute('x2', x1); line.setAttribute('y2', y1);\n        line.setAttribute('stroke', 'url(#signalGrad)');\n        line.setAttribute('stroke-width', '1.5');\n        line.setAttribute('stroke-linecap', 'round');\n        sig.appendChild(line);\n        const start = performance.now();\n        const dur = 900;\n        function step(t) {\n          const k = Math.min(1, (t - start) / dur);\n          const ex = x1 + (x2 - x1) * k;\n          const ey = y1 + (y2 - y1) * k;\n          line.setAttribute('x2', ex); line.setAttribute('y2', ey);\n          line.setAttribute('opacity', k < 0.7 ? 1 : (1 - (k - 0.7) / 0.3));\n          if (k < 1) requestAnimationFrame(step);\n          else line.remove();\n        }\n        requestAnimationFrame(step);\n      }\n      setInterval(emit, 650);\n    }\n\n    // 3) Shortlist: swap top entry occasionally\n    const rows = document.getElementById('hs-rows');\n    if (rows) {\n      const pool = [\n        { name: 'Aisha Bello', score: 95 },\n        { name: 'Diego Salas', score: 93 },\n        { name: 'Jordan Tan', score: 92 },\n        { name: 'Lena Korhonen', score: 91 },\n        { name: 'Marcus Reed', score: 94 },\n        { name: 'Priya Anand', score: 96 },\n        { name: 'Sara Okafor', score: 90 },\n        { name: 'Hiroshi N.', score: 89 },\n      ];\n      let i = 0;\n      setInterval(() => {\n        const newCand = pool[i++ % pool.length];\n        const newRow = document.createElement('div');\n        newRow.className = 'hs-row entering';\n        newRow.dataset.rank = '1';\n        newRow.innerHTML = `\n          <span class=\"hs-row-rank\">01<\u002Fspan>\n          <span class=\"hs-row-name\">${newCand.name}<\u002Fspan>\n          <span class=\"hs-row-bar\"><span style=\"width:0%\"><\u002Fspan><\u002Fspan>\n          <span class=\"hs-row-score\">${newCand.score}<\u002Fspan>`;\n        rows.insertBefore(newRow, rows.firstChild);\n        // remove last\n        if (rows.children.length > 3) rows.lastElementChild.remove();\n        // animate ranks\n        [...rows.children].forEach((row, idx) => {\n          row.dataset.rank = idx + 1;\n          row.querySelector('.hs-row-rank').textContent = String(idx + 1).padStart(2, '0');\n        });\n        requestAnimationFrame(() => {\n          newRow.classList.remove('entering');\n          newRow.querySelector('.hs-row-bar > span').style.width = newCand.score + '%';\n        });\n      }, 4500);\n    }\n  })();\n\n  // Lucide icons\n  if (window.lucide) lucide.createIcons();\n\n  // Hero toggle (Enterprise / Talent)\n  const heroH1 = document.getElementById('hero-h1');\n  const heroSub = document.getElementById('hero-sub');\n  const heroCtas = document.getElementById('hero-ctas');\n  const toggle = document.getElementById('hero-toggle');\n\n  const heroContent = {\n    enterprise: {\n      h1: 'Hire fast.<br />Hire smart.<br />Hire <em>with AI.<\u002Fem>',\n      sub: 'Veraqon is the AI hiring engine for enterprise. Post a query, receive ranked, pre-interviewed profiles — every candidate vetted by Rachel, our AI interviewer. Days, not months.',\n      primary: 'Find Talent',\n      secondary: 'See how it works',\n    },\n    talent: {\n      h1: 'Be seen for what you\\'re <em>actually<\u002Fem> worth.',\n      sub: 'One interview with Rachel. One verified profile. Get discovered by enterprises ready to hire — no cover letters, no cold applications, no resume games.',\n      primary: 'Join the Network',\n      secondary: 'How the interview works',\n    }\n  };\n\n  toggle.addEventListener('click', e => {\n    const btn = e.target.closest('button');\n    if (!btn) return;\n    [...toggle.children].forEach(c => c.classList.toggle('active', c === btn));\n    const mode = btn.dataset.mode;\n    const c = heroContent[mode];\n    heroH1.innerHTML = c.h1;\n    heroSub.textContent = c.sub;\n    heroCtas.children[0].innerHTML = c.primary + ' <i data-lucide=\"arrow-right\"><\u002Fi>';\n    heroCtas.children[1].textContent = c.secondary;\n    if (window.lucide) lucide.createIcons();\n  });\n\n  // Steps interactions\n  const steps = document.querySelectorAll('#steps-list .step');\n  const cards = document.querySelectorAll('#steps-vis .step-card');\n  steps.forEach(s => s.addEventListener('click', () => {\n    const i = +s.dataset.step;\n    steps.forEach(x => x.classList.toggle('active', x === s));\n    cards.forEach((c, ci) => c.classList.toggle('active', ci === i));\n  }));\n\n  // Auto-advance steps every 4s if user hasn't interacted\n  let autoIdx = 0; let userTouched = false;\n  document.getElementById('steps-list').addEventListener('click', () => userTouched = true);\n  setInterval(() => {\n    if (userTouched) return;\n    autoIdx = (autoIdx + 1) % steps.length;\n    steps.forEach((x, i) => x.classList.toggle('active', i === autoIdx));\n    cards.forEach((c, i) => c.classList.toggle('active', i === autoIdx));\n  }, 4500);\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
